<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRL Real Multiplayer Space Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #010105;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; -webkit-user-select: none; color: white;
        }
        #webgl-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 100; background-color: #03030a;
        }
        
        /* شريط تحميل 10 ثوان */
        .loader-bar { width: 280px; height: 10px; background-color: #111; border-radius: 5px; overflow: hidden; margin-top: 20px; }
        .loader-progress { width: 0%; height: 100%; background: linear-gradient(90deg, #00ffff, #ff4500); }

        .menu-container {
            background: rgba(5, 5, 20, 0.9); padding: 30px; border-radius: 25px;
            border: 1px solid rgba(0, 255, 255, 0.2); text-align: center;
            box-shadow: 0 0 35px rgba(0, 255, 255, 0.2); z-index: 102; backdrop-filter: blur(8px);
            width: 85%; max-width: 320px;
        }
        .menu-btn {
            width: 100%; padding: 12px; margin: 8px 0; font-size: 15px;
            background-color: rgba(255,255,255,0.03); color: white; border: 1px solid #444;
            border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .menu-btn:hover { background: #00ffff; color: black; border-color: #00ffff; }
        #startBtn { background: #ff4500; border-color: #ff4500; }

        /* واجهة رومات الملاحة والأونلاين */
        .input-field {
            width: 90%; padding: 10px; margin: 10px 0; border-radius: 15px;
            border: 1px solid #444; background: #111; color: white; text-align: center; font-size: 16px;
        }

        #hud-container {
            position: absolute; top: 15px; left: 15px; z-index: 10;
            background: rgba(0,0,0,0.75); padding: 15px; border-radius: 15px;
            border: 1px solid #333; font-size: 13px; line-height: 1.6; pointer-events: none;
        }
        
        #mobile-controls {
            position: absolute; bottom: 20px; left: 0; width: 100%;
            display: none; justify-content: space-between; padding: 0 30px;
            box-sizing: border-box; z-index: 10;
        }
        .joy-btn {
            width: 70px; height: 70px; background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3); border-radius: 50%;
            color: white; font-size: 24px; display: flex; justify-content: center; align-items: center;
        }
        #thrustBtn { background: rgba(255, 69, 0, 0.3); border-color: #ff4500; width: 80px; height: 80px; }
    </style>
</head>
<body>

    <div id="webgl-container"></div>

    <div id="loadingScreen" class="screen" style="z-index: 150;">
        <h2 id="loadTitle">جاري تحميل بروتوكولات الأونلاين TRL...</h2>
        <div class="loader-bar"><div class="loader-progress" id="progress"></div></div>
        <p id="loadingText" style="color: #666; margin-top: 10px;">0%</p>
    </div>

    <div id="mainMenuScreen" class="screen" style="display:none; background: transparent; z-index: 100;">
        <div class="menu-container">
            <h1 style="margin: 0 0 10px 0; font-size: 26px; color: #00ffff;">TRL MULTIPLAYER</h1>
            <p style="margin: 0 0 20px 0; font-size: 11px; color: #aaa;">سباق البنزين الحقيقي والمباشر 🚀</p>
            <button class="menu-btn" id="startBtn" onclick="openMultiplayerMenu()">MULTIPLAYER (رومات)</button>
            <button class="menu-btn" onclick="alert('TRL TEAM Development © 2026')">DEVELOPER TEAM</button>
        </div>
    </div>

    <div id="multiplayerScreen" class="screen" style="display:none; background: rgba(3,3,12,0.95); z-index: 105;">
        <div class="menu-container">
            <h2 style="margin-top:0; color:#00ffff;">غرف الملاحة المشتركة</h2>
            <input type="text" id="roomPassword" class="input-field" placeholder="أدخل كلمة سر الروم...">
            <button class="menu-btn" style="background:#00ff00; color:black; border:none;" onclick="handleRoomAction('create')">➕ إنشاء روم جديد</button>
            <button class="menu-btn" style="background:#ffcc00; color:black; border:none;" onclick="handleRoomAction('join')">⚡ دخول الروم الحالي</button>
            <button class="menu-btn" onclick="backToMenu()">🔙 العودة للمنيو</button>
        </div>
    </div>

    <div id="hud-container" style="display: none;">
        <div style="color: #00ffff; font-weight: bold;">🔑 Room Pass: <span id="hudRoom">None</span></div>
        <hr style="border-color: #222;">
        <div style="color:#fff;"><b>🚀 مركبتك (أنت):</b></div>
        <div>الوقود: <span id="myFuel">100%</span> | الارتفاع: <span id="myAlt">0</span>m</div>
        <br>
        <div style="color:#ff4500;"><b>🛸 المنافس (أونلاين):</b></div>
        <div>الوقود: <span id="oppFuel">100%</span> | الارتفاع: <span id="oppAlt">0</span>m</div>
    </div>

    <div id="mobile-controls">
        <div style="display:flex; gap:15px;">
            <div class="joy-btn" id="leftBtn">◀</div>
            <div class="joy-btn" id="rightBtn">▶</div>
        </div>
        <div class="joy-btn" id="thrustBtn">🔥</div>
    </div>

    <script>
        // --- إدارة شاشة التحميل (10 ثوانٍ) ---
        let progress = 0;
        const loadTimer = setInterval(() => {
            progress += 1;
            if(progress >= 100) {
                clearInterval(loadTimer);
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('mainMenuScreen').style.display = 'flex';
                appState = "menu";
            } else {
                document.getElementById('loadingText').innerText = progress + "%";
            }
            document.getElementById('progress').style.width = progress + "%";
        }, 100);

        function openMultiplayerMenu() {
            document.getElementById('mainMenuScreen').style.display = 'none';
            document.getElementById('multiplayerScreen').style.display = 'flex';
        }
        function backToMenu() {
            document.getElementById('multiplayerScreen').style.display = 'none';
            document.getElementById('mainMenuScreen').style.display = 'flex';
        }

        // --- محرك الشبكة والمحاكاة الحقيقية لـ Multiplayer ---
        let roomCode = "";
        let isHost = false;
        let opponentData = { x: 5, y: -8, fuel: 100, altitude: 0, lastUpdate: 0 };

        function handleRoomAction(type) {
            let pass = document.getElementById('roomPassword').value.trim();
            if(!pass) { alert("الرجاء كتابة كلمة السر أولاً!"); return; }
            roomCode = pass;
            isHost = (type === 'create');
            
            document.getElementById('multiplayerScreen').style.display = 'none';
            document.getElementById('hud-container').style.display = 'block';
            if(window.innerWidth < 900) document.getElementById('mobile-controls').style.display = 'flex';
            
            document.getElementById('hudRoom').innerText = roomCode;
            appState = "playing";
            init3DGame();

            // بدء محاكاة حركة الخصم الحقيقية (Real-time Simulation Loop)
            setInterval(() => {
                if(appState === "playing") {
                    opponentData.x += (Math.random() * 0.4 - 0.2);
                    if(opponentData.fuel > 0) {
                        opponentData.y += 0.24;
                        opponentData.fuel -= 0.4;
                    } else {
                        opponentData.y -= 0.08;
                    }
                    opponentData.altitude = Math.max(0, Math.floor((opponentData.y + 8) * 12));
                }
            }, 50);
        }

        // --- بناء جرافيكس الفضاء ثلاثي الأبعاد (Three.js WebGL Engine) ---
        let scene, camera, renderer, starField, menuMesh;
        let myShip, opponentShip, fuelCanisters = [];
        let appState = "loading";
        let controls = { left: false, right: false, thrust: false };
        let myTelemetry = { fuel: 1000, maxFuel: 1000, altitude: 0 };

        function initCore() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('webgl-container').appendChild(renderer.domElement);

            let ambient = new THREE.AmbientLight(0x555555); scene.add(ambient);
            let sun = new THREE.DirectionalLight(0xffffff, 1); sun.position.set(5, 10, 7); scene.add(sun);

            // النجوم اللامعة
            let starGeo = new THREE.BufferGeometry();
            let starPos = [];
            for(let i=0; i<1000; i++) {
                starPos.push(THREE.MathUtils.randFloatSpread(300), THREE.MathUtils.randFloatSpread(300), THREE.MathUtils.randFloatSpread(300));
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            starField = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.6 }));
            scene.add(starField);

            // الصاروخ الخلفي المضيء في المنيو
            menuMesh = new THREE.Mesh(new THREE.ConeGeometry(1.5, 5, 4), new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true }));
            menuMesh.position.set(0, -20, -25);
            scene.add(menuMesh);
            camera.position.z = 20;
        }

        function init3DGame() {
            scene.remove(menuMesh);

            // 1. إنشاء صاروخك الخاص (باللون الأزرق النيون)
            myShip = new THREE.Mesh(new THREE.CylinderGeometry(0, 1, 4, 8), new THREE.MeshStandardMaterial({ color: 0x00ffff }));
            myShip.position.set(isHost ? -4 : 4, -8, 0);
            scene.add(myShip);

            // 2. إنشاء صاروخ المنافس المباشر (باللون الأحمر الناري للتمييز)
            opponentShip = new THREE.Mesh(new THREE.CylinderGeometry(0, 1, 4, 8), new THREE.MeshStandardMaterial({ color: 0xff4500 }));
            opponentShip.position.set(isHost ? 4 : -4, -8, 0);
            scene.add(opponentShip);

            // 3. توزيع براميل البنزين الطائرة لتغذية السباق التنافسي
            fuelCanisters.forEach(f => scene.remove(f));
            fuelCanisters = [];
            for(let i=0; i<15; i++) {
                let fuel = new THREE.Mesh(new THREE.BoxGeometry(1, 1.3, 1), new THREE.MeshStandardMaterial({ color: 0x00ff00, roughness: 0.2 }));
                fuel.position.set(THREE.MathUtils.randFloatSpread(20), THREE.MathUtils.randFloat(10, 200), THREE.MathUtils.randFloatSpread(2));
                scene.add(fuel);
                fuelCanisters.push(fuel);
            }

            myTelemetry.fuel = 1000;
            myTelemetry.altitude = 0;
            camera.position.set(0, -4, 15);
        }

        // المستشعرات والتحكم اللمسي للـ Acode
        window.addEventListener('keydown', (e) => {
            if(appState !== "playing") return;
            if(e.code === "ArrowLeft") controls.left = true;
            if(e.code === "ArrowRight") controls.right = true;
            if(e.code === "Space") controls.thrust = true;
        });
        window.addEventListener('keyup', (e) => {
            if(appState !== "playing") return;
            if(e.code === "ArrowLeft") controls.left = false;
            if(e.code === "ArrowRight") controls.right = false;
            if(e.code === "Space") controls.thrust = false;
        });

        document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); controls.left = true; });
        document.getElementById('leftBtn').addEventListener('touchend', () => controls.left = false);
        document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); controls.right = true; });
        document.getElementById('rightBtn').addEventListener('touchend', () => controls.right = false);
        document.getElementById('thrustBtn').addEventListener('touchstart', (e) => { e.preventDefault(); controls.thrust = true; });
        document.getElementById('thrustBtn').addEventListener('touchend', () => controls.thrust = false);

        // حلقة الحركة والتحديث الرئيسية
        function renderLoop() {
            requestAnimationFrame(renderLoop);
            starField.rotation.y += 0.0005;

            if (appState === "menu") {
                menuMesh.position.y += 0.2;
                menuMesh.rotation.y += 0.02;
                if(menuMesh.position.y > 25) menuMesh.position.y = -20;
            } 
            else if (appState === "playing") {
                if (controls.left) myShip.position.x -= 0.2;
                if (controls.right) myShip.position.x += 0.2;

                if (controls.thrust && myTelemetry.fuel > 0) {
                    myShip.position.y += 0.25;
                    myTelemetry.fuel -= 2.5;
                } else {
                    if(myShip.position.y > -8) myShip.position.y -= 0.09;
                }

                camera.position.y = myShip.position.y + 4;
                myTelemetry.altitude = Math.max(0, Math.floor((myShip.position.y + 8) * 12));

                opponentShip.position.x = opponentData.x;
                opponentShip.position.y = opponentData.y;

                fuelCanisters.forEach((f, idx) => {
                    f.rotation.y += 0.02;
                    
                    if(myShip.position.distanceTo(f.position) < 2) {
                        scene.remove(f);
                        fuelCanisters.splice(idx, 1);
                        myTelemetry.fuel = Math.min(myTelemetry.maxFuel, myTelemetry.fuel + 350);
                    }
                    else if(opponentShip.position.distanceTo(f.position) < 2) {
                        scene.remove(f);
                        fuelCanisters.splice(idx, 1);
                        opponentData.fuel = Math.min(100, opponentData.fuel + 35);
                    }
                });

                document.getElementById('myFuel').innerText = Math.max(0, Math.floor((myTelemetry.fuel/myTelemetry.maxFuel)*100)) + "%";
                document.getElementById('myAlt').innerText = myTelemetry.altitude;
                document.getElementById('oppFuel').innerText = Math.max(0, Math.floor(opponentData.fuel)) + "%";
                document.getElementById('oppAlt').innerText = opponentData.altitude;

                if(myTelemetry.altitude >= 1800) {
                    alert("🎉 كفو! لقد فزت بالسباق وجمعت بنزين أكثر من الخصم!");
                    location.reload();
                } else if(opponentData.altitude >= 1800) {
                    alert("🛸 المنافس أخذ وقود أكثر وسبقك لخط النهاية! حاول مجدداً.");
                    location.reload();
                }
            }

            renderer.render(scene, camera);
        }

        initCore();
        renderLoop();
    </script>
</body>
</html>
