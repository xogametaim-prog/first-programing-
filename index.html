<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRL Real P2P Multiplayer Space Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/chr15m/bugout/bugout.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #010103;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; -webkit-user-select: none; color: white;
        }
        #webgl-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 100; background-color: #020207;
        }
        
        .loader-bar { width: 280px; height: 10px; background-color: #111; border-radius: 5px; overflow: hidden; margin-top: 20px; }
        .loader-progress { width: 0%; height: 100%; background: linear-gradient(90deg, #00ffff, #ff4500); }

        .menu-container {
            background: rgba(4, 4, 15, 0.93); padding: 30px; border-radius: 25px;
            border: 1px solid rgba(0, 255, 255, 0.25); text-align: center;
            box-shadow: 0 0 35px rgba(0, 255, 255, 0.3); z-index: 102; backdrop-filter: blur(10px);
            width: 85%; max-width: 320px;
        }
        .menu-btn {
            width: 100%; padding: 12px; margin: 8px 0; font-size: 15px;
            background-color: rgba(255,255,255,0.04); color: white; border: 1px solid #444;
            border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .menu-btn:hover { background: #00ffff; color: black; border-color: #00ffff; box-shadow: 0 0 15px #00ffff; }
        #startBtn { background: #ff4500; border-color: #ff4500; }

        .input-field {
            width: 90%; padding: 11px; margin: 10px 0; border-radius: 15px;
            border: 1px solid #555; background: #0c0c14; color: white; text-align: center; font-size: 16px;
        }

        #hud-container {
            position: absolute; top: 15px; left: 15px; z-index: 10;
            background: rgba(2,2,8,0.85); padding: 15px; border-radius: 15px;
            border: 1px solid #00ffff; font-size: 13px; line-height: 1.6; pointer-events: none;
            box-shadow: 0 0 15px rgba(0,255,255,0.1);
        }
        
        #mobile-controls {
            position: absolute; bottom: 20px; left: 0; width: 100%;
            display: none; justify-content: space-between; padding: 0 30px;
            box-sizing: border-box; z-index: 10;
        }
        .joy-btn {
            width: 70px; height: 70px; background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3); border-radius: 50%;
            color: white; font-size: 24px; display: flex; justify-content: center; align-items: center;
        }
        #thrustBtn { background: rgba(255, 69, 0, 0.4); border-color: #ff4500; width: 80px; height: 80px; }
        #netStatus { font-size: 12px; color: #ff3333; margin-top: 5px; font-weight: bold;}
    </style>
</head>
<body>

    <div id="webgl-container"></div>

    <div id="loadingScreen" class="screen" style="z-index: 150;">
        <h2>تجهيز محرك الـ P2P الحقيقي...</h2>
        <div class="loader-bar"><div class="loader-progress" id="progress"></div></div>
        <p id="loadingText" style="color: #666; margin-top: 10px;">0%</p>
    </div>

    <div id="mainMenuScreen" class="screen" style="display:none; background: transparent; z-index: 100;">
        <div class="menu-container">
            <h1 style="margin: 0 0 5px 0; font-size: 26px; color: #00ffff; letter-spacing: 1px;">TRL P2P NET</h1>
            <p style="margin: 0 0 20px 0; font-size: 11px; color: #888;">سباق بنزين ومزامنة لاعبين حقيقية 🌐</p>
            <button class="menu-btn" id="startBtn" onclick="openMultiplayerMenu()">MULTIPLAYER (رومات حقيقية)</button>
            <button class="menu-btn" onclick="alert('TRL TEAM - Real WebRTC Engine 2026')">DEVELOPER TEAM</button>
        </div>
    </div>

    <div id="multiplayerScreen" class="screen" style="display:none; background: rgba(2,2,7,0.96); z-index: 105;">
        <div class="menu-container">
            <h2 style="margin-top:0; color:#00ffff;">شبكة الغرف الحية</h2>
            <p style="font-size:11px; color:#aaa; margin:0;">اكتب نفس كلمة السر لتتصل فوراً بجهاز صديقك</p>
            <input type="text" id="roomPassword" class="input-field" placeholder="رقم أو كلمة سر الغرفة...">
            <button class="menu-btn" style="background:#00ff00; color:black; border:none;" onclick="connectToP2PRoom()">⚡ اتصال وبدء المزامنة</button>
            <button class="menu-btn" onclick="backToMenu()">🔙 عودة</button>
        </div>
    </div>

    <div id="hud-container" style="display: none;">
        <div style="color: #00ffff; font-weight: bold;">🔑 الغرفة: <span id="hudRoom">None</span></div>
        <div id="netStatus">⏳ جاري البحث عن لاعبين بالروم...</div>
        <hr style="border-color: #222;">
        <div style="color:#00ffff;"><b>🚀 مركبتك الفضائية:</b></div>
        <div>بنزين: <span id="myFuel">100%</span> | ارتفاع: <span id="myAlt">0</span>m</div>
        <br>
        <div style="color:#ff4500;"><b>🛸 اللاعب الآخر (حقيقي):</b></div>
        <div>بنزين: <span id="oppFuel">100%</span> | ارتفاع: <span id="oppAlt">0</span>m</div>
    </div>

    <div id="mobile-controls">
        <div style="display:flex; gap:15px;">
            <div class="joy-btn" id="leftBtn">◀</div>
            <div class="joy-btn" id="rightBtn">▶</div>
        </div>
        <div class="joy-btn" id="thrustBtn">🔥</div>
    </div>

    <script>
        let progress = 0;
        const loadTimer = setInterval(() => {
            progress += 2;
            if(progress >= 100) {
                clearInterval(loadTimer);
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('mainMenuScreen').style.display = 'flex';
                appState = "menu";
            }
            document.getElementById('loadingText').innerText = progress + "%";
            document.getElementById('progress').style.width = progress + "%";
        }, 50);

        function openMultiplayerMenu() {
            document.getElementById('mainMenuScreen').style.display = 'none';
            document.getElementById('multiplayerScreen').style.display = 'flex';
        }
        function backToMenu() {
            document.getElementById('multiplayerScreen').style.display = 'none';
            document.getElementById('mainMenuScreen').style.display = 'flex';
        }

        // --- محرك الشبكة الحقيقي (WebRTC P2P Real MultiPlayer) ---
        let bgt = null;
        let peerConnected = false;
        let opponentNetData = { x: 4, y: -8, fuel: 100, altitude: 0 };

        function connectToP2PRoom() {
            let roomPass = document.getElementById('roomPassword').value.trim();
            if(!roomPass) { alert("من فضلك اكتب كلمة سر الروم!"); return; }

            document.getElementById('multiplayerScreen').style.display = 'none';
            document.getElementById('hud-container').style.display = 'block';
            if(window.innerWidth < 900) document.getElementById('mobile-controls').style.display = 'flex';
            document.getElementById('hudRoom').innerText = roomPass;

            appState = "playing";
            init3DScene();

            // ربط القناة اللاسلكية المشفرة بين الأجهزة بناءً على الباسورد
            bgt = new Bugout("trl-space-room-" + roomPass);

            bgt.on("seen", (address) => {
                peerConnected = true;
                document.getElementById("netStatus").innerText = "● تم اتصال اللاعب الآخر بنجاح! 🟢";
                document.getElementById("netStatus").style.color = "#00ff00";
            });

            bgt.on("message", (address, data) => {
                if (data && data.type === "sync") {
                    opponentNetData.x = data.x;
                    opponentNetData.y = data.y;
                    opponentNetData.fuel = data.fuel;
                    opponentNetData.altitude = data.alt;
                }
            });

            // إرسال إحداثياتك الحالية وجزيئات البنزين لصديقك كل 45 ملي ثانية
            setInterval(() => {
                if(appState === "playing" && bgt) {
                    bgt.send({
                        type: "sync",
                        x: myShip.position.x,
                        y: myShip.position.y,
                        fuel: Math.floor((myTelemetry.fuel / myTelemetry.maxFuel) * 100),
                        alt: myTelemetry.altitude
                    });
                }
            }, 45);
        }

        // --- محرك الرسومات ثلاثي الأبعاد المتقدم والواقعي (Three.js Engine) ---
        let scene, camera, renderer, starField, menuMesh;
        let myShip, opponentShip, fuelTanks = [], fireParticles = [];
        let appState = "loading";
        let controls = { left: false, right: false, thrust: false };
        let myTelemetry = { fuel: 1000, maxFuel: 1000, altitude: 0 };

        function initCore() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('webgl-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0x666666));
            let light = new THREE.DirectionalLight(0xffffff, 1.2); light.position.set(5, 15, 10); scene.add(light);

            let starGeo = new THREE.BufferGeometry();
            let starPos = [];
            for(let i=0; i<1200; i++) starPos.push(THREE.MathUtils.randFloatSpread(400), THREE.MathUtils.randFloatSpread(400), THREE.MathUtils.randFloatSpread(400));
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            starField = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 }));
            scene.add(starField);

            menuMesh = new THREE.Mesh(new THREE.ConeGeometry(1, 4, 5), new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true }));
            menuMesh.position.set(0, -15, -20);
            scene.add(menuMesh);
            camera.position.z = 16;
        }

        // دالة بناء صاروخ واقعي جداً ومفصل برمجياً
        function createRealisticRocket(colorHex) {
            let group = new THREE.Group();

            // 1. جسم الصاروخ الرئيسي الاسطواني المعدني
            let bodyGeo = new THREE.CylinderGeometry(0.8, 0.9, 4, 16);
            let bodyMat = new THREE.MeshStandardMaterial({ color: colorHex, metalness: 0.7, roughness: 0.2 });
            let body = new THREE.Mesh(bodyGeo, bodyMat);
            group.add(body);

            // 2. قمة الرأس الانسيابية المدببة (المخروط)
            let noseGeo = new THREE.ConeGeometry(0.8, 1.5, 16);
            let noseMat = new THREE.MeshStandardMaterial({ color: 0xdd1111, metalness: 0.5 });
            let nose = new THREE.Mesh(noseGeo, noseMat);
            nose.position.y = 2.75;
            group.add(nose);

            // 3. المحرك السفلي النفاث (المصيدة العادمة)
            let engineGeo = new THREE.CylinderGeometry(0.5, 0.7, 0.6, 12);
            let engineMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.9 });
            let engine = new THREE.Mesh(engineGeo, engineMat);
            engine.position.y = -2.3;
            group.add(engine);

            // 4. الأجنحة الجانبية الدافعة للاستقرار (الزعانف الهوائية)
            let finGeo = new THREE.BoxGeometry(1.5, 1, 0.1);
            let finMat = new THREE.MeshStandardMaterial({ color: 0xdd1111 });
            
            let fin1 = new THREE.Mesh(finGeo, finMat); fin1.position.set(1.2, -1.5, 0); fin1.rotation.z = -0.3; group.add(fin1);
            let fin2 = new THREE.Mesh(finGeo, finMat); fin2.position.set(-1.2, -1.5, 0); fin2.rotation.z = 0.3; group.add(fin2);

            return group;
        }

        function init3DScene() {
            scene.remove(menuMesh);

            // صاروخك الواقعي
            myShip = createRealisticRocket(0x00ffff);
            myShip.position.set(-3, -6, 0);
            scene.add(myShip);

            // صاروخ اللاعب الحقيقي الآخر
            opponentShip = createRealisticRocket(0xffaa00);
            opponentShip.position.set(3, -6, 0);
            scene.add(opponentShip);

            // براميل بنزين واقعية
            fuelTanks.forEach(f => scene.remove(f));
            fuelTanks = [];
            for(let i=0; i<15; i++) {
                let fTank = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1.2, 12), new THREE.MeshStandardMaterial({ color: 0x00ff00, metalness: 0.4 }));
                fTank.position.set(THREE.MathUtils.randFloatSpread(18), THREE.MathUtils.randFloat(10, 250), THREE.MathUtils.randFloatSpread(1));
                scene.add(fTank);
                fuelTanks.push(fTank);
            }

            myTelemetry.fuel = 1000;
            camera.position.set(0, -2, 14);
        }

        // إدارة المدخلات
        window.addEventListener('keydown', (e) => {
            if(appState !== "playing") return;
            if(e.code === "ArrowLeft") controls.left = true;
            if(e.code === "ArrowRight") controls.right = true;
            if(e.code === "Space") controls.thrust = true;
        });
        window.addEventListener('keyup', (e) => {
            if(appState !== "playing") return;
            if(e.code === "ArrowLeft") controls.left = false;
            if(e.code === "ArrowRight") controls.right = false;
            if(e.code === "Space") controls.thrust = false;
        });

        document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); controls.left = true; });
        document.getElementById('leftBtn').addEventListener('touchend', () => controls.left = false);
        document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); controls.right = true; });
        document.getElementById('rightBtn').addEventListener('touchend', () => controls.right = false);
        document.getElementById('thrustBtn').addEventListener('touchstart', (e) => { e.preventDefault(); controls.thrust = true; });
        document.getElementById('thrustBtn').addEventListener('touchend', () => controls.thrust = false);

        // حلقة الرسم والتحديث المستمر
        function renderLoop() {
            requestAnimationFrame(renderLoop);
            starField.rotation.y += 0.0004;

            if (appState === "menu") {
                menuMesh.position.y += 0.15;
                menuMesh.rotation.y += 0.03;
                if(menuMesh.position.y > 20) menuMesh.position.y = -15;
            } 
            else if (appState === "playing") {
                if (controls.left) myShip.position.x -= 0.18;
                if (controls.right) myShip.position.x += 0.18;

                if (controls.thrust && myTelemetry.fuel > 0) {
                    myShip.position.y += 0.25;
                    myTelemetry.fuel -= 2;

                    // توليد جزيئات نار وعادم حقيقية أسفل المحرك
                    let p = new THREE.Mesh(new THREE.SphereGeometry(0.2, 4, 4), new THREE.MeshBasicMaterial({ color: 0xff4500 }));
                    p.position.set(myShip.position.x, myShip.position.y - 2.5, myShip.position.z);
                    scene.add(p);
                    fireParticles.push(p);
                } else {
                    if(myShip.position.y > -6) myShip.position.y -= 0.08;
                }

                // تحديث جزيئات النيران المتساقطة للتلاشي
                fireParticles.forEach((p, idx) => {
                    p.position.y -= 0.15;
                    p.scale.multiplyScalar(0.92);
                    if(p.scale.x < 0.1) { scene.remove(p); fireParticles.splice(idx, 1); }
                });

                camera.position.y = myShip.position.y + 3;
                myTelemetry.altitude = Math.max(0, Math.floor((myShip.position.y + 6) * 12));

                // مزامنة موقع وحركة الصاروخ للاعب الحقيقي الآخر فورياً عبر الشبكة
                opponentShip.position.x = opponentNetData.x;
                opponentShip.position.y = opponentNetData.y;

                // التفاعل مع علب البنزين
                fuelTanks.forEach((f, idx) => {
                    f.rotation.y += 0.03;
                    if(myShip.position.distanceTo(f.position) < 1.8) {
                        scene.remove(f); fuelTanks.splice(idx, 1);
                        myTelemetry.fuel = Math.min(myTelemetry.maxFuel, myTelemetry.fuel + 350);
                    }
                });

                // تحديث الأرقام والنسب الحية على واجهة الـ HUD
                document.getElementById('myFuel').innerText = Math.max(0, Math.floor((myTelemetry.fuel / myTelemetry.maxFuel) * 100)) + "%";
                document.getElementById('myAlt').innerText = myTelemetry.altitude;
                document.getElementById('oppFuel').innerText = opponentNetData.fuel + "%";
                document.getElementById('oppAlt').innerText = opponentNetData.altitude;

                // شروط الفوز بالسباق التنافسي الحقيقي
                if(myTelemetry.altitude >= 2000) {
                    alert("🎉 مبروك! لقد فزت بالسباق الحقيقي وجمعت بنزين أكثر من منافسك!");
                    location.reload();
                } else if(opponentNetData.altitude >= 2000) {
                    alert("🏁 العضو الآخر جمع بنزين أسرع وسبقك إلى خط النهاية!");
                    location.reload();
                }
            }

            renderer.render(scene, camera);
        }

        initCore();
        renderLoop();
    </script>
</body>
</html>
